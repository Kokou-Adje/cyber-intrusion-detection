<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 760" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Intrusion detection ML pipeline data flow">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 1 Ingest -->
  <rect x="250" y="20" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="40" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">1. Ingest</text>
  <text x="340" y="56" text-anchor="middle" font-size="12" fill="#444441">Merge CSVs, fix headers</text>
  <line x1="340" y1="64" x2="340" y2="86" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2 Clean -->
  <rect x="250" y="88" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="108" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">2. Clean</text>
  <text x="340" y="124" text-anchor="middle" font-size="12" fill="#0F6E56">Drop Inf, NaN, duplicates</text>
  <line x1="340" y1="132" x2="340" y2="154" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3 Select features -->
  <rect x="250" y="156" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="176" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">3. Select features</text>
  <text x="340" y="192" text-anchor="middle" font-size="12" fill="#0F6E56">Drop identifiers</text>
  <line x1="340" y1="200" x2="340" y2="222" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4 Encode labels -->
  <rect x="250" y="224" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="244" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">4. Encode labels</text>
  <text x="340" y="260" text-anchor="middle" font-size="12" fill="#0F6E56">Collapse to families</text>
  <line x1="340" y1="268" x2="340" y2="290" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5 Build sequences -->
  <rect x="250" y="292" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="312" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">5. Feature matrix</text>
  <text x="340" y="328" text-anchor="middle" font-size="12" fill="#0F6E56">one row per flow</text>
  <line x1="340" y1="336" x2="340" y2="358" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Leakage boundary -->
  <rect x="120" y="360" width="440" height="100" rx="12" fill="none" stroke="#A32D2D" stroke-width="0.8" stroke-dasharray="5 4"/>
  <rect x="232" y="350" width="216" height="20" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="340" y="364" text-anchor="middle" font-size="12" fill="#791F1F">Leakage boundary &#8212; order matters</text>

  <rect x="140" y="392" width="180" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="230" y="412" text-anchor="middle" font-size="14" font-weight="500" fill="#501313">6. Split</text>
  <text x="230" y="428" text-anchor="middle" font-size="12" fill="#791F1F">Stratified train/val/test</text>
  <line x1="320" y1="414" x2="358" y2="414" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="360" y="392" width="180" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="450" y="412" text-anchor="middle" font-size="14" font-weight="500" fill="#501313">7. Scale</text>
  <text x="450" y="428" text-anchor="middle" font-size="12" fill="#791F1F">Fit MinMax on train only</text>

  <line x1="340" y1="460" x2="340" y2="484" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8 Persist -->
  <rect x="250" y="486" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="506" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">8. Persist artifacts</text>
  <text x="340" y="522" text-anchor="middle" font-size="12" fill="#444441">Arrays, scaler, label map</text>
  <line x1="340" y1="530" x2="340" y2="552" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 9-10 Train -->
  <rect x="250" y="554" width="180" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="574" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">9-10. Train models</text>
  <text x="340" y="590" text-anchor="middle" font-size="12" fill="#534AB7">Baseline, CNN, Transformer</text>
  <line x1="340" y1="598" x2="340" y2="620" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 12 Ensemble -->
  <rect x="250" y="622" width="180" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="642" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">12. Ensemble</text>
  <text x="340" y="658" text-anchor="middle" font-size="12" fill="#534AB7">Soft-vote CNN + Transformer</text>
  <line x1="300" y1="666" x2="240" y2="688" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="666" x2="440" y2="688" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 11 Evaluate / 13 Serve -->
  <rect x="140" y="690" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="230" y="710" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">11. Evaluate</text>
  <text x="230" y="726" text-anchor="middle" font-size="12" fill="#185FA5">Metrics, FPR, baseline cmp</text>
  <rect x="360" y="690" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="450" y="710" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">13. Serve</text>
  <text x="450" y="726" text-anchor="middle" font-size="12" fill="#185FA5">Streamlit demo</text>
</svg>
