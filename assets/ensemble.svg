<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 400" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Model ensemble structure">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="250" y="20" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="40" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Scaled sequences</text>
  <text x="340" y="56" text-anchor="middle" font-size="12" fill="#444441">Shape (N, 15, 78)</text>

  <line x1="320" y1="64" x2="140" y2="118" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="64" x2="340" y2="118" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="64" x2="540" y2="118" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Random Forest -->
  <rect x="40" y="120" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="120" y="143" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Random Forest</text>
  <text x="120" y="161" text-anchor="middle" font-size="12" fill="#854F0B">Baseline to beat</text>

  <!-- CNN -->
  <rect x="260" y="120" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="143" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">1D-CNN</text>
  <text x="340" y="161" text-anchor="middle" font-size="12" fill="#534AB7">Local burst patterns</text>

  <!-- Transformer -->
  <rect x="480" y="120" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="560" y="143" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Transformer</text>
  <text x="560" y="161" text-anchor="middle" font-size="12" fill="#534AB7">Long-range patterns</text>

  <line x1="340" y1="176" x2="320" y2="232" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="176" x2="380" y2="232" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ensemble -->
  <rect x="250" y="234" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="257" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Soft-vote ensemble</text>
  <text x="340" y="275" text-anchor="middle" font-size="12" fill="#0F6E56">Average probabilities</text>
  <line x1="340" y1="290" x2="340" y2="312" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="250" y="314" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="334" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Class + confidence</text>
  <text x="340" y="350" text-anchor="middle" font-size="12" fill="#0F6E56">Alert decision</text>

  <!-- Baseline comparison note -->
  <line x1="120" y1="176" x2="120" y2="324" stroke="#888780" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <rect x="58" y="330" width="124" height="20" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="120" y="344" text-anchor="middle" font-size="12" fill="#444441">Compared, not merged</text>
</svg>
